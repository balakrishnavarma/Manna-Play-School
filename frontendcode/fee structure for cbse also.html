<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Structure</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 30px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        header {
            background: #ff5733;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1 {
            margin: 0;
            font-size: 36px;
        }
        p {
            font-size: 18px;
            margin: 10px 0;
        }
        .fee-table {
            margin: 20px auto;
            width: 80%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #f1f1f1;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #007BFF;
            color: white;
        }
        tr:nth-child(even) {
            background: #eaf3ff;
        }
        footer {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Fee Structure</h1>
            <p>Academic Year 2024-25</p>
        </header>
        <section class="fee-table">
            <table>
                <tr>
                    <th>Class</th>
                    <th>Normal Fee (₹)</th>
                    <th>CBSE Program Fee (₹)</th>
                </tr>
                <tr>
                    <td>Play School</td>
                    <td>30,000</td>
                    <td>-</td>
                </tr>
                <tr>
                    <td>LKG</td>
                    <td>40,000</td>
                    <td>80,000</td>
                </tr>
                <tr>
                    <td>UKG</td>
                    <td>50,000</td>
                    <td>1,00,000</td>
                </tr>
            </table>
        </section>
        <footer>
            <p>For inquiries, contact: <strong><a href="tel:7981372766" style="color: inherit; text-decoration: none;">7981372766</a>, <a href="tel:8332940530" style="color: inherit; text-decoration: none;">8332940530</a></strong></p>
        </footer>
    </div>
</body>
</html>
